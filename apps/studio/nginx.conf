# apps/studio/nginx.conf
# SPA fallback so client-side routing works behind the reverse proxy.
# The Studio calls the API directly from the browser (api.<domain>), so no
# server-side proxy to `api` is needed here — Caddy handles API routing.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
