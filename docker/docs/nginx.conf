# docker/docs/nginx.conf
# Static docs site with SPA-style fallback to index.html and raw markdown.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Render markdown files as plain text (browsers show them inline).
    location ~* \.md$ {
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
