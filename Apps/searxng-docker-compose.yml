# Standalone SearXNG for ChatGobDO
# Properly configured: anonymous JSON API enabled, no authentication, open-results.
services:
  chatgobdo-searxng:
    image: searxng/searxng:latest
    container_name: chatgobdo-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8090/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
